<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Service Reports</title>
  <script src="msal-browser.min.js"></script>
  <script src="auth.js"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --color-bg: #f4f6f9;
      --color-surface: #ffffff;
      --color-border: #d1d5db;
      --color-border-focus: #3b82f6;
      --color-text: #1f2937;
      --color-text-muted: #6b7280;
      --color-primary: #1d4ed8;
      --color-primary-hover: #1e40af;
      --color-accent: #eff6ff;
      --radius: 8px;
      --shadow: 0 1px 3px rgba(0, 0, 0, 0.10), 0 1px 2px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 6px rgba(0, 0, 0, 0.07), 0 2px 4px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 18px 40px rgba(15, 23, 42, 0.18);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    header {
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      box-shadow: var(--shadow);
      padding: 0 clamp(1rem, 5vw, 3rem);
    }

    .header-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 0;
    }

    .header-inner img {
      height: clamp(36px, 6vw, 52px);
      width: auto;
      object-fit: contain;
      flex-shrink: 0;
    }

    .header-inner h1 {
      font-size: clamp(1.1rem, 3vw, 1.6rem);
      font-weight: 700;
      color: var(--color-primary);
      letter-spacing: -0.01em;
    }

    .header-link-button {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0.6rem 1rem;
      border: 1px solid var(--color-primary);
      border-radius: var(--radius);
      background: var(--color-primary);
      color: #ffffff;
      font-size: 0.92rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .header-link-button:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    main {
      max-width: 900px;
      margin: 2rem auto;
      padding: 0 clamp(1rem, 4vw, 2rem);
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card-shell {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(1.25rem, 4vw, 2rem);
    }

    .page-intro {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .eyebrow {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .page-intro h2 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      color: var(--color-text);
      letter-spacing: -0.02em;
    }

    .page-intro p {
      max-width: 60ch;
      color: var(--color-text-muted);
      line-height: 1.6;
    }

    .page-intro-actions {
      margin-top: 0.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
    }

    .page-link-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0.7rem 1rem;
      border: 1px solid var(--color-primary);
      border-radius: var(--radius);
      background: var(--color-primary);
      color: #ffffff;
      font-size: 0.95rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }

    .page-link-button:hover {
      background: var(--color-primary-hover);
      border-color: var(--color-primary-hover);
      transform: translateY(-1px);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.25rem;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .filter-group label {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .search-select {
      position: relative;
    }

    .search-select-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 0.55rem 0.75rem;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--color-text);
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: var(--color-border-focus);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .search-select-input-wrap input {
      padding-right: 4.25rem;
    }

    .ss-clear {
      position: absolute;
      right: 2rem;
      display: none;
      align-items: center;
      justify-content: center;
      width: 1.5rem;
      height: 1.5rem;
      border: none;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .ss-clear:hover {
      color: var(--color-primary);
    }

    .ss-arrow {
      position: absolute;
      right: 0.75rem;
      display: flex;
      align-items: center;
      color: var(--color-text-muted);
      pointer-events: none;
    }

    .ss-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      display: none;
      max-height: 220px;
      overflow-y: auto;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      z-index: 50;
    }

    .ss-dropdown.open {
      display: block;
    }

    .ss-option {
      padding: 0.55rem 0.75rem;
      font-size: 0.92rem;
      cursor: pointer;
      transition: background 0.12s;
    }

    .ss-option:hover,
    .ss-option.highlighted {
      background: var(--color-accent);
      color: var(--color-primary);
    }

    .ss-no-results {
      padding: 0.55rem 0.75rem;
      color: var(--color-text-muted);
      font-size: 0.9rem;
      font-style: italic;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: 1rem;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 1.1rem;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .card:hover {
      border-color: var(--color-border-focus);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }

    .card h3 {
      color: var(--color-text);
      font-size: 0.98rem;
    }

    .card p {
      font-size: 0.92rem;
      color: var(--color-text);
    }

    .card strong {
      color: var(--color-text-muted);
    }

    .card-highlight-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.75rem;
    }

    .card-highlight {
      padding: 0.85rem 0.9rem;
      background: #f8fbff;
      border: 1px solid #dbeafe;
      border-radius: var(--radius);
    }

    .card-highlight-label {
      margin-bottom: 0.3rem;
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-primary);
    }

    .card-highlight-value {
      font-size: 1rem;
      font-weight: 700;
      color: var(--color-text);
      line-height: 1.35;
    }

    .card-details {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .empty {
      color: var(--color-text-muted);
      font-style: italic;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(17, 24, 39, 0.5);
      backdrop-filter: blur(2px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      z-index: 200;
    }

    .modal {
      width: min(100%, 820px);
      max-height: 90vh;
      overflow: auto;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      padding: clamp(1.25rem, 4vw, 2rem);
      box-shadow: var(--shadow-lg);
    }

    .modal h2 {
      margin-bottom: 1rem;
      color: var(--color-primary);
    }

    .section {
      margin-top: 1.25rem;
    }

    .section h3 {
      margin-bottom: 0.75rem;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--color-text-muted);
    }

    .info-grid {
      display: grid;
      grid-template-columns: 180px 1fr;
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--color-surface);
    }

    .info-grid div {
      padding: 0.8rem 0.9rem;
      border-bottom: 1px solid var(--color-border);
    }

    .info-grid div:nth-last-child(-n + 2) {
      border-bottom: none;
    }

    .label {
      background: #f9fafb;
      font-weight: 600;
      color: var(--color-text-muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    th,
    td {
      border-bottom: 1px solid var(--color-border);
      padding: 0.8rem 0.9rem;
      text-align: left;
      font-size: 0.92rem;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    th {
      background: var(--color-accent);
      color: var(--color-primary);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .close-btn {
      margin-top: 1.25rem;
      padding: 0.65rem 1.25rem;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: var(--color-primary);
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      box-shadow: var(--shadow);
    }

    .close-btn:hover {
      background: var(--color-primary-hover);
      box-shadow: var(--shadow-md);
    }

    @media (max-width: 640px) {
      .card-highlight-grid {
        grid-template-columns: 1fr;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }

      .info-grid div {
        border-bottom: 1px solid var(--color-border);
      }

      .info-grid div:last-child {
        border-bottom: none;
      }

      .modal-backdrop {
        padding: 0.75rem;
      }

      .modal {
        max-height: 94vh;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <img src="logo.png" alt="Logo" />
      <h1>Service Reports</h1>
      <a class="header-link-button" href="index.html">Submit new report</a>
    </div>
  </header>

  <main>
    <section class="card-shell page-intro">
      <span class="eyebrow">History</span>
      <h2>Submitted service reports</h2>
      <p>Filter reports by technician or tenant and open a card to inspect the full service details recorded in the system.</p>
      <div class="page-intro-actions">
        <a class="page-link-button" href="updates.html">List software updates only</a>
      </div>
    </section>

    <section class="card-shell">
      <div class="filters">
        <div class="filter-group">
          <label for="technicianSearch">Technician</label>
          <div class="search-select">
            <div class="search-select-input-wrap">
              <input id="technicianSearch" placeholder="Search technician" autocomplete="off" />
              <button type="button" class="ss-clear" id="technicianClear" aria-label="Clear technician filter">&#x2715;</button>
              <span class="ss-arrow">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
                </svg>
              </span>
            </div>
            <div id="technicianDropdown" class="ss-dropdown"></div>
          </div>
        </div>

        <div class="filter-group">
          <label for="tenantSearch">Tenant</label>
          <div class="search-select">
            <div class="search-select-input-wrap">
              <input id="tenantSearch" placeholder="Search tenant" autocomplete="off" />
              <button type="button" class="ss-clear" id="tenantClear" aria-label="Clear tenant filter">&#x2715;</button>
              <span class="ss-arrow">
                <svg width="14" height="14" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd" />
                </svg>
              </span>
            </div>
            <div id="tenantDropdown" class="ss-dropdown"></div>
          </div>
        </div>
      </div>
    </section>

    <section id="cards" class="cards"></section>
  </main>

  <div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div id="modalContent"></div>
      <button class="close-btn" id="closeModal">Close</button>
    </div>
  </div>

  <script src="reports.js"></script>
</body>
</html>
